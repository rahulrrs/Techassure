services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: techassure
      POSTGRES_PASSWORD: techassure
      POSTGRES_DB: techassure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techassure"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://techassure:techassure@db:5432/techassure
      JWT_SECRET: replace-with-a-secure-secret
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
